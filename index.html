<html>

<head>
    <title>AP World History Final Project</title>

    <style>
        body {
            font-size: 20px;
            color: black;
            background-color: steelblue;
            text-align: center;
        }

        img {
            width: 700px;
            margin-top: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        #features,
        #religionOutput {
            margin-top: 20px;
            white-space: pre-line;
        }

        nav {
            margin: 20px 0;
        }

        nav button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #ffffff;
            border-radius: 8px;
        }

        nav button:hover {
            background-color: #e0e0e0;
        }

        .section {
            display: none;
        }

        #geo-image img {
            width: 90%;
            max-width: 1000px;
            height: auto;
            border-radius: 10px;
        }
    </style>

    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll(".section");

            sections.forEach(section => {
                section.style.display = "none";
            });

            document.getElementById(sectionId).style.display = "block";
        }

        function getPhysicalFeatures() {
            document.getElementById("features").innerText = `
Physical Features:

Deccan Plateau (majority of Karnataka)
- Covers most of the state
- Semi-arid climate with moderate rainfall
- Supports drought-resistant crops like millets, cotton, and oilseeds
- Red and black soils influence farming patterns

Western Ghats (western border)
- Mountainous and heavily forested region
- High rainfall area
- Supports plantation crops like coffee, tea, and spices
- Rich forests provide timber and sandalwood
- Rivers and steep terrain support hydroelectric power

Coastal Plain (Arabian Sea coast)
- Narrow, low-lying region with heavy rainfall
- Supports rice farming and coconut/cashew plantations
- Fishing is important
- Ports help trade and transportation

Major Rivers (Kaveri, Krishna, and Tungabhadra)
- Provide irrigation for agriculture
- Support hydroelectric power
- Supply water to drier inland regions

Mineral Resources
- Includes iron ore, chromite, and other minerals
- Supports mining and heavy industry
`;
        }

        function getFeatureImages() {
            document.getElementById("physical_feature_images").innerHTML = `
                <img src="PXL_20230714_101956414.jpg">
                <img src="PXL_20240806_064409684.PANO.jpg">
                <img src="PXL_20230708_093817563.jpg">
                <img src="PXL_20240730_124015214.PANO.jpg">
                <img src="PXL_20250728_054502046.jpg">
                <img src="PXL_20250731_130011985.jpg">
                <img src="PXL_20250722_092851452.jpg">
                <img src="PXL_20240806_085401966.PANO.jpg">
                <img src="PXL_20240809_132605668.PANO.jpg">
                <img src="PXL_20240811_054521682.PANO.jpg">
            `;
        }

        function showReligions() {
            document.getElementById("religionOutput").innerText = `
Major Religions in Karnataka

Hinduism: 84.00%
Islam: 12.92%
Christianity: 1.87%
Jainism: 0.72%
Buddhism & Sikhism: ~0.21%

Analysis:
Religion spread into India through trade routes like the Silk Road and Indian Ocean trade networks. Hinduism originated in India while Islam arrived through merchants and invasions. Christianity spread through trade and European contact.
`;
        }

    function showReligionMap() {
         document.getElementById("mapOutput").innerHTML = '<img src="M1-2.png">';
    }

        window.onload = function () {
            showSection('geo');
        };
    </script>
</head>

<body>

    <h3>AP World History Final Project - Karnataka</h3>

    <nav>
        <button onclick="showSection('geo')">Geographic Overview</button>
        <button onclick="showSection('physical')">Physical Features</button>
        <button onclick="showSection('culture')">Cultural Diffusion</button>
        <button onclick="showSection('history')">History (1200–Present)</button>
    </nav>

    <div id="geo" class="section">
        <h2>Geographic Determinism & Spatial Awareness</h2>

        <p>
            Region: South Asia <br>
            Continent: Asia <br>
            Country: India <br>
            State: Karnataka
        </p>

        <div id="geo-image">
            <img src="flightpath.png" alt="Karnataka flight path">
        </div>

        <img src="Karnataka_districts_map.svg.png" alt="Karnataka districts map">
        <img src="karnataka-red-highlighted-in-map-of-india-2A6XMJ7.jpg" alt="Karnataka in India map">
    </div>

    <div id="physical" class="section">
        <h2>Physical Features</h2>

        <button onclick="getPhysicalFeatures()">
            Load Physical Features
        </button>

        <div id="features"></div>

        <button onclick="getFeatureImages()">
            Show Images
        </button>

        <div id="physical_feature_images"></div>
    </div>

<div id="culture" class="section">
    <h2>Cultural Synthesis & Diffusion</h2>

    <button onclick="showReligions()">
        Load Major Religions in Karnataka
    </button>

    <div id="religionOutput"></div>

    <button onclick="showReligionMap()">
        Load Map Showing Diffusion of Religions
    </button>

    <div id="mapOutput"></div>
</div>

</body>

</html>
