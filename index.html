        function getPhysicalFeatures() {
            document.getElementById("features").innerText = `
Physical Features:

Deccan Plateau (majority of Karnataka)
- Covers most of the state
- Semi-arid climate with moderate rainfall
- Supports drought-resistant crops like millets, cotton, and oilseeds
- Red and black soils influence farming patterns

Western Ghats (western border)
- Mountainous and heavily forested region
- High rainfall area
- Supports plantation crops like coffee, tea, and spices
- Rich forests provide timber and sandalwood
- Rivers and steep terrain support hydroelectric power

Coastal Plain (Arabian Sea coast)
- Narrow, low-lying region with heavy rainfall
- Supports rice farming and coconut/cashew plantations
- Fishing is important
- Ports help trade and transportation

Major Rivers (Kaveri, Krishna, and Tungabhadra)
- Provide irrigation for agriculture
- Support hydroelectric power
- Supply water to drier inland regions

Mineral Resources
- Includes iron ore, chromite, and other minerals
- Supports mining and heavy industry

Climate
- Subtropical
- Precipitation ranges from roughly 20 inches to nearly 160 inches
- Most of the annual precipitation falls between June and September

Plants and Animals
- Coconut palms line the lagoons of the coastal plain region
- Monsoon forests cover the Western Ghats
- Scrublands stretch across the drier plains
- The monsoon forests are especially rich in wildlife

GEOGRAPHICAL ANALYSIS

The physical setting of Karnataka has been instrumental in determining its culture and economy. The Western Ghats provided a natural barrier, protecting many local kingdoms and preserving regional traditions. The heavy rainfall along the coast encouraged trade through ports in the Arabian Sea, linking Karnataka to the Indian Ocean trade network. The Deccan Plateau was good for agriculture and the expansion of settlements, and rivers allowed for irrigation and the construction of cities and temples.
Karnataka was on trade routes and many religions, languages and cultural traditions diffused into the region through the centuries.
`;

CULTURAL / HERITAGE REFLECTION

I can see evidence of Karnataka's culture in modern global society through food, music, religion, and technology.
Indian cultural traditions such as yoga, Hindu festivals, and Indian cuisine have spread worldwide through migration and globalization.
Karnataka's role in technology and software development also connects it to the global economy today.
At the same time, traditional languages, clothing, and regional customs continue to preserve local identity despite outside influences.
This shows how cultures can adapt to globalization while still maintaining historical traditions.
