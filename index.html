<!DOCTYPE html>
<html>

<head>
    <title>AP World History Final Project</title>

    <style>
        body {
            font-size: 20px;
            color: black;
            background-color: steelblue;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        img {
            width: 700px;
            margin-top: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }

        #features,
        #religionOutput,
        #stateInfo {
            margin-top: 20px;
            white-space: pre-line;
        }

        #stateInfo {
            font-size: 16px;
        }

        nav {
            margin: 20px 0;
        }

        nav button {
            padding: 10px 15px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #ffffff;
            border-radius: 8px;
        }

        nav button:hover {
            background-color: #e0e0e0;
        }

        .section {
            display: none;
        }

        #geo-image img {
            width: 90%;
            max-width: 1000px;
            height: auto;
            border-radius: 10px;
        }

        .open-btn {
            margin-top: 15px;
            padding: 12px 18px;
            font-size: 16px;
            border: none;
            background-color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .open-btn:hover {
            background-color: #e0e0e0;
        }
    </style>

    <script>
        function showSection(sectionId) {
            const sections = document.querySelectorAll(".section");

            sections.forEach(section => {
                section.style.display = "none";
            });

            const selectedSection = document.getElementById(sectionId);

            if (selectedSection) {
                selectedSection.style.display = "block";
            }
        }

        function getPhysicalFeatures() {
            document.getElementById("features").innerText = `
Physical Features:

Deccan Plateau (majority of Karnataka)
- Covers most of the state
- Semi-arid climate with moderate rainfall
- Supports drought-resistant crops like millets, cotton, and oilseeds
- Red and black soils influence farming patterns

Western Ghats (western border)
- Mountainous and heavily forested region
- High rainfall area
- Supports plantation crops like coffee, tea, and spices
- Rich forests provide timber and sandalwood
- Rivers and steep terrain support hydroelectric power

Coastal Plain (Arabian Sea coast)
- Narrow, low-lying region with heavy rainfall
- Supports rice farming and coconut/cashew plantations
- Fishing is important
- Ports help trade and transportation

Major Rivers (Kaveri, Krishna, and Tungabhadra)
- Provide irrigation for agriculture
- Support hydroelectric power
- Supply water to drier inland regions

Mineral Resources
- Includes iron ore, chromite, and other minerals
- Supports mining and heavy industry

Climate
- Subtropical
- Precipitation ranges from roughly 20 inches to nearly 160 inches
- Most of the annual precipitation falls between June and September

Plants and Animals
- Coconut palms line the lagoons of the coastal plain region
- Monsoon forests cover the Western Ghats
- Scrublands stretch across the drier plains
- The monsoon forests are especially rich in wildlife
`;
        }

        function getFeatureImages() {
            document.getElementById("physical_feature_images").innerHTML = `
                <img src="PXL_20230714_101956414.jpg">
                <img src="PXL_20240806_064409684.PANO.jpg">
                <img src="PXL_20230708_093817563.jpg">
                <img src="PXL_20240730_124015214.PANO.jpg">
                <img src="PXL_20250728_054502046.jpg">
                <img src="PXL_20250731_130011985.jpg">
                <img src="PXL_20250722_092851452.jpg">
                <img src="PXL_20240806_085401966.PANO.jpg">
                <img src="PXL_20240809_132605668.PANO.jpg">
                <img src="PXL_20240811_054521682.PANO.jpg">
            `;
        }

        function showReligions() {
            document.getElementById("religionOutput").innerText = `
Major Religions in Karnataka

Hinduism: 84.00%
Islam: 12.92%
Christianity: 1.87%
Jainism: 0.72%
Buddhism and Sikhism: ~0.21%

Analysis:
Karnataka has a Hindu majority, but it also has significant Muslim,
Christian, and Jain communities. Religion has shaped Karnataka's
architecture, culture, festivals, and trade networks for centuries.
`;
        }

        function showReligionMap() {
            document.getElementById("mapOutput").innerHTML =
                '<img src="M1-2.png">';
        }

        function showKarnatakaInfoMap() {
            document.getElementById("mapInfo").innerHTML = `
                <img src="Karnataka_districts_map.svg.png">
                <img src="karnataka-red-highlighted-in-map-of-india-2A6XMJ7.jpg">
            `;
        }

        function showKarnatakaInfoCities() {
            document.getElementById("stateInfoCities").innerHTML = `
<h3>Major Cities in Karnataka</h3>

Bengaluru - IT capital<br>
Mysuru - heritage & palaces<br>
Mangaluru - coastal port city<br>
Hubballi-Dharwad - commercial & education hub<br>
Belagavi - northern Karnataka city<br>
Udupi - temple & coastal culture<br>
Bidar - historic fort city<br>
Vijayapura - Indo-Islamic heritage<br>
Kalaburagi - northern historic city

<h3>Famous Places in Karnataka</h3>

<h4>Heritage</h4>
Hampi - UNESCO ruins<br>
Mysuru Palace - royal landmark<br>
Badami, Aihole, Pattadakal - ancient temples<br>
Belur & Halebidu - Hoysala architecture

<h4>Nature</h4>
Coorg - coffee hills<br>
Chikmagalur - mountains & coffee estates<br>
Agumbe - rainforest<br>
Kabini - wildlife safaris

<h4>Beaches</h4>
Gokarna - beaches & spiritual town<br>
Karwar - calm coastline<br>
Udupi & Mangaluru beaches

<h4>Waterfalls</h4>
Jog Falls - major waterfall<br>
Shivanasamudra Falls - Kaveri River<br>
Abbey Falls - Coorg
`;
        }

        function showKarnatakaInfoState() {
            document.getElementById("karnatakaStateInfo").innerHTML = `
<h3>State Info</h3>

- State in southern India<br>
- Bordered by Goa and Maharashtra to the north, Telangana to the east,
- Tamil Nadu to the southeast, Kerala to the south, and the Arabian Sea to the west.<br>

- Capital: Bengaluru (Bangalore)<br>
- Population: 73,540,000 people<br>

<h3>Languages</h3>
- The main language is Kannada, but other languages are also spoken.<br>

<h3>Economy</h3>
- One of India's leading economic states<br>
- Major center for information technology and biotechnology<br>
- Strong industries include aerospace, manufacturing, silk production, and agriculture<br>
- Coffee and spice plantations contribute significantly to exports<br>
- Mining supports heavy industry and industrial development<br>

<h3>Education and Technology</h3>
- Major hub for science, engineering, and higher education<br>
- Known for research institutions and technology companies<br>
- Large startup and innovation ecosystem<br>
- Contributes significantly to India's software and technology sectors<br>

<h3>Tourism</h3>
- Famous for palaces, temples, forests, and heritage sites<br>
- Known for historical architecture and religious landmarks<br>
- Popular for wildlife tourism, trekking, and cultural festivals<br>
- UNESCO heritage sites attract international visitors
`;
        }

        window.onload = function () {
            showSection('geo');
        };
    </script>
</head>

<body>

    <h1>AP World History Final Project - Karnataka</h1>

    <nav>
        <button onclick="showSection('geo')">
            Geographic Overview
        </button>

        <button onclick="showSection('karnataka')">
            Karnataka Overview
        </button>

        <button onclick="showSection('physical')">
            Physical Features
        </button>

        <button onclick="showSection('culture')">
            Cultural Diffusion
        </button>

        <button onclick="showSection('history')">
            History 1200 to Present
        </button>
    </nav>

    <!-- GEOGRAPHIC OVERVIEW -->
    <div id="geo" class="section">
        <h2>Geographic Determinism & Spatial Awareness</h2>

        <p>
            Region: South Asia <br>
            Continent: Asia <br>
            Country: India <br>
            State: Karnataka
        </p>

        <div id="geo-image">
            <img src="flightpath.png">
        </div>
    </div>

    <!-- KARNATAKA OVERVIEW -->
    <div id="karnataka" class="section">
        <h2>Karnataka Overview</h2>

        <button onclick="showKarnatakaInfoMap()">
            Load Maps of Karnataka
        </button>

        <div id="mapInfo"></div>

        <br><br>

        <button onclick="showKarnatakaInfoState()">
            Load Info about Karnataka
        </button>

        <div id="karnatakaStateInfo"></div>

        <br><br>

        <button onclick="showKarnatakaInfoCities()">
            Load Info about Karnataka's Cities
        </button>

        <div id="stateInfoCities"></div>
    </div>

    <!-- PHYSICAL FEATURES -->
    <div id="physical" class="section">
        <h2>Physical Features</h2>

        <button onclick="getPhysicalFeatures()">
            Load Physical Features
        </button>

        <div id="features"></div>

        <button onclick="getFeatureImages()">
            Show Images
        </button>

        <div id="physical_feature_images"></div>
    </div>

    <!-- CULTURE -->
    <div id="culture" class="section">
        <h2>Cultural Synthesis & Diffusion</h2>

        <button onclick="showReligions()">
            Load Major Religions
        </button>

        <div id="religionOutput"></div>

        <button onclick="showReligionMap()">
            Load Religion Map
        </button>

        <div id="mapOutput"></div>
    </div>

    <!-- HISTORY -->
    <div id="history" class="section">
        <h2>History of Karnataka (1200-Present)</h2>

     
    </div>

</body>

</html>
